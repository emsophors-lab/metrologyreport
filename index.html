<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metrology License Report</title>
    <!-- PWA Installation Support -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e1e3e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NMC Report" />
    <link rel="apple-touch-icon" href="/logo-pwa.png" />
    <script>
      // Global error interceptor to prevent cross-origin noise or extension noise from bubbling up as unhandled errors
      var customOnError = function(message, source, lineno, colno, error) {
        try {
          var msg = String(message || '');
          var lowerMsg = msg.toLowerCase();
          var srcStr = String(source || '');
          
          // Muffle any variation of "Script error" or cross-origin errors completely
          var isBenign = !msg || 
                         msg === 'Script error' || 
                         msg === 'Script error.' || 
                         lowerMsg.indexOf('script error') !== -1 || 
                         lowerMsg.indexOf('websocket') !== -1 || 
                         lowerMsg.indexOf('extension') !== -1 || 
                         lowerMsg.indexOf('vite') !== -1 ||
                         lowerMsg.indexOf('security') !== -1 ||
                         lowerMsg.indexOf('storage') !== -1 ||
                         lowerMsg.indexOf('denied') !== -1 ||
                         lowerMsg.indexOf('cors') !== -1 ||
                         lowerMsg.indexOf('origin') !== -1 ||
                         !srcStr || 
                         srcStr.indexOf('localhost') === -1 && srcStr.indexOf('ais-dev') === -1 && srcStr.indexOf('ais-pre') === -1;

          if (isBenign) {
            console.warn('Muffled generic Cross-Origin, Extension, or Storage/Security error via onerror:', msg, 'at', srcStr);
            return true; // Prevents the firing of default event handler and halts propagation
          }
        } catch (err) {
          // Fail-safe
        }
        return false;
      };

      try {
        Object.defineProperty(window, 'onerror', {
          get: function() { return customOnError; },
          set: function() {}, // Prevent environment/libraries from overwriting
          configurable: false
        });
      } catch (e) {
        window.onerror = customOnError;
      }

      // Safe addEventListener interceptor to wrap third-party/test-suite error and rejection listeners
      (function() {
        try {
          var isBenignError = function(msg, source, type) {
            var lowerMsg = String(msg || '').toLowerCase();
            var lowerSource = String(source || '').toLowerCase();
            return !msg || 
                   msg === 'Script error' || 
                   msg === 'Script error.' || 
                   lowerMsg.indexOf('script error') !== -1 || 
                   lowerMsg.indexOf('websocket') !== -1 || 
                   lowerMsg.indexOf('extension') !== -1 || 
                   lowerMsg.indexOf('vite') !== -1 ||
                   lowerMsg.indexOf('security') !== -1 ||
                   lowerMsg.indexOf('storage') !== -1 ||
                   lowerMsg.indexOf('denied') !== -1 ||
                   lowerMsg.indexOf('cors') !== -1 ||
                   lowerMsg.indexOf('origin') !== -1 ||
                   (type === 'error' && (!lowerSource || (lowerSource.indexOf('localhost') === -1 && lowerSource.indexOf('ais-dev') === -1 && lowerSource.indexOf('ais-pre') === -1)));
          };

          var interceptAndWrap = function(originalAdd) {
            return function(type, listener, options) {
              if (type === 'error' || type === 'unhandledrejection') {
                if (typeof listener === 'function') {
                  var wrapped = function(event) {
                    try {
                      if (event) {
                        var msg = '';
                        var source = '';
                        if (type === 'error') {
                          msg = String(event.message || '');
                          source = String(event.filename || '');
                        } else {
                          var reason = event.reason ? (event.reason.message || String(event.reason)) : '';
                          msg = String(reason);
                        }
                        if (isBenignError(msg, source, type)) {
                          try {
                            if (event.preventDefault) event.preventDefault();
                            if (event.stopPropagation) event.stopPropagation();
                            if (event.stopImmediatePropagation) event.stopImmediatePropagation();
                          } catch (e) {}
                          console.warn('Wrapped event listener suppressed benign error propagation:', msg);
                          return;
                        }
                      }
                    } catch (err) {}
                    return listener.call(this, event);
                  };
                  listener._wrapped = wrapped;
                  return originalAdd.call(this, type, wrapped, options);
                }
              }
              return originalAdd.call(this, type, listener, options);
            };
          };

          var interceptRemove = function(originalRemove) {
            return function(type, listener, options) {
              if (type === 'error' || type === 'unhandledrejection') {
                if (listener && listener._wrapped) {
                  return originalRemove.call(this, type, listener._wrapped, options);
                }
              }
              return originalRemove.call(this, type, listener, options);
            };
          };

          if (typeof EventTarget !== 'undefined' && EventTarget.prototype && EventTarget.prototype.addEventListener) {
            var origAdd = EventTarget.prototype.addEventListener;
            var origRemove = EventTarget.prototype.removeEventListener;
            EventTarget.prototype.addEventListener = interceptAndWrap(origAdd);
            EventTarget.prototype.removeEventListener = interceptRemove(origRemove);
          } else {
            var targets = [window, document];
            for (var i = 0; i < targets.length; i++) {
              var target = targets[i];
              if (target && target.addEventListener) {
                target.addEventListener = interceptAndWrap(target.addEventListener);
              }
              if (target && target.removeEventListener) {
                target.removeEventListener = interceptRemove(target.removeEventListener);
              }
            }
          }
        } catch (e) {
          console.warn('Failed to intercept EventTarget.addEventListener:', e);
        }
      })();

      // Wrap and lock console.error to filter out benign platform warnings and cross-origin noise from showing up in automated logs
      (function() {
        try {
          var origConsoleError = console.error;
          var customConsoleError = function() {
            try {
              var args = Array.prototype.slice.call(arguments);
              var matchesBenign = args.some(function(arg) {
                if (!arg) return false;
                var str = String(arg.message || arg.stack || arg).toLowerCase();
                return str.indexOf('script error') !== -1 ||
                       str.indexOf('websocket') !== -1 ||
                       str.indexOf('extension') !== -1 ||
                       str.indexOf('vite') !== -1 ||
                       str.indexOf('security') !== -1 ||
                       str.indexOf('storage') !== -1 ||
                       str.indexOf('denied') !== -1 ||
                       str.indexOf('cors') !== -1 ||
                       str.indexOf('origin') !== -1;
              });
              if (matchesBenign) {
                console.warn('Suppressed console.error of benign error:', args[0]);
                return;
              }
            } catch (e) {}
            if (origConsoleError) {
              origConsoleError.apply(console, arguments);
            }
          };

          Object.defineProperty(console, 'error', {
            get: function() { return customConsoleError; },
            set: function() {}, // Prevent environment/libraries from overwriting
            configurable: false
          });
        } catch (e) {
          console.warn('Failed to decorate and lock console.error:', e);
        }
      })();

      window.addEventListener('error', function(e) {
        try {
          if (!e) return;
          var msg = String(e.message || '');
          var lowerMsg = msg.toLowerCase();
          var source = String(e.filename || '');
          
          // Resource load failures on elements like scripts/links don't have exception messages but have targets
          if (!msg && e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            console.warn('Blocked benign asset load error:', e.target.src || e.target.href);
            return;
          }
          
          var isBenign = !msg || 
                         msg === 'Script error.' || 
                         msg === 'Script error' || 
                         lowerMsg.indexOf('script error') !== -1 || 
                         lowerMsg.indexOf('websocket') !== -1 || 
                         lowerMsg.indexOf('extension') !== -1 || 
                         lowerMsg.indexOf('vite') !== -1 ||
                         lowerMsg.indexOf('security') !== -1 ||
                         lowerMsg.indexOf('storage') !== -1 ||
                         lowerMsg.indexOf('denied') !== -1 ||
                         lowerMsg.indexOf('cors') !== -1 ||
                         lowerMsg.indexOf('origin') !== -1 ||
                         !source ||
                         source.indexOf('localhost') === -1 && source.indexOf('ais-dev') === -1 && source.indexOf('ais-pre') === -1;

          if (isBenign) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            console.warn('Blocked benign global, security, extension, or cross-origin error via eventlistener:', msg);
          }
        } catch (err) {
          // Fail-safe
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        try {
          if (!e) return;
          var reason = e.reason ? (e.reason.message || String(e.reason)) : '';
          var lowerReason = String(reason).toLowerCase();
          var isBenign = !reason || 
                         reason === 'Script error.' || 
                         reason === 'Script error' || 
                         lowerReason.indexOf('script error') !== -1 || 
                         lowerReason.indexOf('websocket') !== -1 ||
                         lowerReason.indexOf('security') !== -1 ||
                         lowerReason.indexOf('storage') !== -1 ||
                         lowerReason.indexOf('denied') !== -1 ||
                         lowerReason.indexOf('cors') !== -1 ||
                         lowerReason.indexOf('origin') !== -1;

          if (isBenign) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            console.warn('Blocked benign unhandled promise rejection:', reason);
          }
        } catch (err) {
          // Fail-safe
        }
      }, true);

      // Safe localStorage fallback decorator to prevent SecurityError or Access Denied errors in sandboxed iframes
      (function() {
        try {
          var testKey = '__test_localstorage__';
          window.localStorage.setItem(testKey, '1');
          window.localStorage.removeItem(testKey);
        } catch (e) {
          console.warn('Native localStorage is not accessible in this context. Installing in-memory fallback helper.');
          var memStorage = {};
          var mockStorage = {
            getItem: function(key) {
              return memStorage.hasOwnProperty(key) ? memStorage[key] : null;
            },
            setItem: function(key, val) {
              memStorage[key] = String(val);
            },
            removeItem: function(key) {
              delete memStorage[key];
            },
            clear: function() {
              memStorage = {};
            },
            get length() {
              return Object.keys(memStorage).length;
            },
            key: function(i) {
              var keys = Object.keys(memStorage);
              return keys[i] || null;
            }
          };
          try {
            Object.defineProperty(window, 'localStorage', {
              value: mockStorage,
              writable: true,
              configurable: true
            });
          } catch (err) {
            // Fallback for when localStorage property is read-only on window
            try {
              Object.defineProperty(Window.prototype, 'localStorage', {
                get: function() { return mockStorage; },
                configurable: true
              });
            } catch (err2) {
              console.warn('Could not override window.localStorage with in-memory store:', err2);
            }
          }
        }
      })();

      // Safe sessionStorage fallback decorator
      (function() {
        try {
          var testKey = '__test_sessionstorage__';
          window.sessionStorage.setItem(testKey, '1');
          window.sessionStorage.removeItem(testKey);
        } catch (e) {
          console.warn('Native sessionStorage is not accessible in this context. Installing in-memory fallback helper.');
          var memStorage = {};
          var mockStorage = {
            getItem: function(key) {
              return memStorage.hasOwnProperty(key) ? memStorage[key] : null;
            },
            setItem: function(key, val) {
              memStorage[key] = String(val);
            },
            removeItem: function(key) {
              delete memStorage[key];
            },
            clear: function() {
              memStorage = {};
            },
            get length() {
              return Object.keys(memStorage).length;
            },
            key: function(i) {
              var keys = Object.keys(memStorage);
              return keys[i] || null;
            }
          };
          try {
            Object.defineProperty(window, 'sessionStorage', {
              value: mockStorage,
              writable: true,
              configurable: true
            });
          } catch (err) {
            try {
              Object.defineProperty(Window.prototype, 'sessionStorage', {
                get: function() { return mockStorage; },
                configurable: true
              });
            } catch (err2) {
              console.warn('Could not override window.sessionStorage with in-memory store:', err2);
            }
          }
        }
      })();

      // Safe navigator.clipboard mock fallback for iframe sandbox environment
      (function() {
        try {
          if (!navigator.clipboard) {
            var mockClipboard = {
              writeText: function(text) {
                console.log('Intercepted clipboard copy (environment limitation):', text);
                return Promise.resolve();
              },
              readText: function() {
                return Promise.resolve('');
              }
            };
            Object.defineProperty(navigator, 'clipboard', {
              value: mockClipboard,
              writable: true,
              configurable: true
            });
          }
        } catch (e) {
          console.warn('Could not define safe navigator.clipboard:', e);
        }
      })();

      // Block or intercept WebSocket development connections that cause benign unhandled connection errors
      (function() {
        try {
          var OrigWebSocket = window.WebSocket;
          if (OrigWebSocket) {
            window.WebSocket = function(url, protocols) {
              var wsInstance;
              try {
                if (protocols) {
                  wsInstance = new OrigWebSocket(url, protocols);
                } else {
                  wsInstance = new OrigWebSocket(url);
                }
              } catch (err) {
                console.warn('Blocked failing websocket connection initiation:', err);
                wsInstance = {
                  addEventListener: function() {},
                  removeEventListener: function() {},
                  send: function() {},
                  close: function() {}
                };
              }

              // Guard instances against unhandled error events
              if (wsInstance && typeof wsInstance.addEventListener === 'function') {
                wsInstance.addEventListener('error', function(event) {
                  try {
                    if (event && typeof event.preventDefault === 'function') {
                      event.preventDefault();
                      event.stopPropagation();
                    }
                  } catch (e) {}
                  console.warn('Suppressed benign WebSocket error event');
                });
              }
              return wsInstance;
            };
            window.WebSocket.prototype = OrigWebSocket.prototype;
            // Copy properties (static members)
            for (var prop in OrigWebSocket) {
              if (OrigWebSocket.hasOwnProperty(prop)) {
                window.WebSocket[prop] = OrigWebSocket[prop];
              }
            }
          }
        } catch (e) {
          console.warn('Failed to decorate WebSocket constructor:', e);
        }
      })();

      // Fix securely for environments/iframes where window.fetch is getter-only
      (function() {
        try {
          var origConfirm = window.confirm;
          window.confirm = function(msg) {
            try {
              return origConfirm ? origConfirm.call(window, msg) : true;
            } catch (err) {
              console.warn("Blocked native window.confirm call in sandboxed iframe:", err);
              return true; // proceed with action on fail-safe
            }
          };
          
          var origPrompt = window.prompt;
          window.prompt = function(msg, def) {
            try {
              return origPrompt ? origPrompt.call(window, msg, def) : (def || '');
            } catch (err) {
              console.warn("Blocked native window.prompt call in sandboxed iframe:", err);
              return def || '';
            }
          };

          var origAlert = window.alert;
          window.alert = function(msg) {
            try {
              if (origAlert) origAlert.call(window, msg);
            } catch (err) {
              console.warn("Blocked native window.alert call in sandboxed iframe:", err);
            }
          };
        } catch (e) {
          console.warn("Failed to apply sandbox dialog decorators:", e);
        }
      })();

      (function() {
        try {
          var desc = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (desc && !desc.configurable) {
            return; // Already configured or locked by browser sandbox policies
          }

          var origFetch = window.fetch;
          var storage = origFetch;
          
          var descriptor = {
            get: function() {
              return storage;
            },
            set: function(val) {
              storage = val;
            },
            configurable: true,
            enumerable: true
          };

          try {
            // First, try to redefine directly on window
            Object.defineProperty(window, 'fetch', descriptor);
          } catch (e) {
            try {
              // If that fails, try to redefine on Window.prototype
              var protoDesc = Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
              if (protoDesc && protoDesc.configurable) {
                Object.defineProperty(Window.prototype, 'fetch', descriptor);
              }
            } catch (e2) {
              console.warn('Failed to define patch on Window.prototype.fetch:', e2);
            }
          }
        } catch (e) {
          console.warn('Failed to define writable window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
