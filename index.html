<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for environments/iframes where window.fetch is getter-only
      (function() {
        try {
          var origFetch = window.fetch;
          if (origFetch) {
            Object.defineProperty(window, 'fetch', {
              value: origFetch,
              writable: true,
              configurable: true
            });
          }
        } catch (e) {
          console.warn('Failed to define writable window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
