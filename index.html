<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for environments/iframes where window.fetch is getter-only
      (function() {
        try {
          var origFetch = window.fetch;
          var storage = origFetch;
          
          var descriptor = {
            get: function() {
              return storage;
            },
            set: function(val) {
              storage = val;
            },
            configurable: true,
            enumerable: true
          };

          try {
            // First, try to redefine directly on window
            Object.defineProperty(window, 'fetch', descriptor);
          } catch (e) {
            try {
              // If that fails, try to redefine on Window.prototype
              Object.defineProperty(Window.prototype, 'fetch', descriptor);
            } catch (e2) {
              console.warn('Failed to define patch on Window.prototype.fetch:', e2);
            }
          }
        } catch (e) {
          console.warn('Failed to define writable window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
